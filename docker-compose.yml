services:
  oracle:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: gitt-oracle
    restart: unless-stopped
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: GittRoot2024
      APP_USER: GITT_SCHEMA
      APP_USER_PASSWORD: GittPass2024
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./db/init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s

volumes:
  oracle-data:
